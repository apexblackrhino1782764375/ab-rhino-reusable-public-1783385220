name: Local Reusable Marker (ATTACKER)

'on':
  workflow_call:
    inputs:
      marker:
        required: true
        type: string

jobs:
  marker:
    runs-on: ubuntu-latest
    steps:
      - name: ATTACKER code path
        shell: bash
        run: |
          set -euo pipefail
          echo "ATTACKER_LOCAL_REUSABLE=1"
          echo "INPUT_MARKER=${{ inputs.marker }}"
          echo "EVENT_NAME=${{ github.event_name }}"
          echo "REPO=${{ github.repository }}"
          echo "SHA=${{ github.sha }}"
